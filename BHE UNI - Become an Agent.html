  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['var(--font-display)', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            sans: ['var(--font-sans)', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            navy: { 950: '#06122a', 900: '#0a1a33', 800: '#0f2747', 700: '#16315a', 600: '#1d3f6f' },

              600: 'rgb(var(--brand-600) / <alpha-value>)', 700: 'rgb(var(--brand-700) / <alpha-value>)',
            },
            teal: { 50: '#f0fdfa', 100: '#ccfbf1', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e' },
          },

  <style>
    :root {
      --font-display: "Kanit", ui-sans-serif, system-ui, sans-serif;
      --font-sans: "Kanit", ui-sans-serif, system-ui, sans-serif;
      --brand-50: 255 245 237; --brand-100: 255 232 212; --brand-200: 255 208 168;
      --brand-300: 255 184 119; --brand-400: 255 154 71; --brand-500: 244 123 32;
      --brand-600: 221 102 16; --brand-700: 179 79 13;
    }
    html { scroll-behavior: smooth; }
    body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    ::selection { background: #ffd0a8; color: #0a1a33; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: none; }
    }
    /* custom scrollbar */
    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-thumb { background: #c5ccd6; border-radius: 9px; border: 3px solid #fff; }
    ::-webkit-scrollbar-thumb:hover { background: #9aa4b2; }
  </style>
</head>
